<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC Dashboard — Water / RPM / Oil</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, system-ui, sans-serif;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "rpm": 3200,
  "waterTemp": 88,
  "oilTemp": 95,
  "darkMode": false,
  "accentColor": "#4CAF50",
  "live": false
}/*EDITMODE-END*/;

// ---- thresholds (deg C) ----
const WATER_WARN = 95;
const WATER_HOT  = 105;
const OIL_WARN   = 110;
const OIL_HOT    = 125;

function tempColor(value, warn, hot, normalColor) {
  if (value >= hot) return '#FF3B30';
  if (value >= warn) return '#FF9500';
  return normalColor;
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksPanelOpen, setTweaksPanelOpen] = React.useState(false);
  const [, force] = React.useReducer((x) => x + 1, 0);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksPanelOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksPanelOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  React.useEffect(() => {
    if (!tweaks.live) return;
    const t = setInterval(force, 250);
    return () => clearInterval(t);
  }, [tweaks.live]);

  const dark = tweaks.darkMode;
  const bg = dark ? '#121212' : '#F2F2F7';
  const cardBg = dark ? '#1E1E1E' : '#fff';
  const text = dark ? '#fff' : '#000';
  const subText = dark ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.5)';

  const jitter = (amp) => tweaks.live ? (Math.sin(Date.now() / 600 + amp) * amp) : 0;
  const rpmValue   = Math.max(0, Math.round(tweaks.rpm + jitter(220)));
  const waterValue = Math.round((tweaks.waterTemp + jitter(0.8)) * 10) / 10;
  const oilValue   = Math.round((tweaks.oilTemp + jitter(0.6)) * 10) / 10;

  const waterColor = tempColor(waterValue, WATER_WARN, WATER_HOT, text);
  const oilColor   = tempColor(oilValue,   OIL_WARN,   OIL_HOT,   text);

  const rpmPct = Math.min(1, rpmValue / 8000);
  const rpmBarColor =
    rpmValue >= 7000 ? '#FF3B30' :
    rpmValue >= 5500 ? '#FF9500' :
    tweaks.accentColor;

  const cardShadow = dark
    ? '0 2px 8px rgba(0,0,0,0.4)'
    : '0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06)';

  const MetricCard = ({ label, value, unit, color, footer }) => (
    <div style={{
      background: cardBg,
      borderRadius: 14,
      padding: '14px 20px',
      boxShadow: cardShadow,
      display: 'flex',
      flexDirection: 'column',
      gap: 2,
      flex: 1,
      justifyContent: 'center'
    }}>
      <div style={{
        fontSize: 11,
        fontWeight: 600,
        color: subText,
        letterSpacing: 1.2,
        textTransform: 'uppercase'
      }}>{label}</div>
      <div style={{
        display: 'flex',
        alignItems: 'baseline',
        gap: 8,
        color: color || text
      }}>
        <span style={{
          fontSize: 44,
          fontWeight: 700,
          letterSpacing: -1.2,
          fontVariantNumeric: 'tabular-nums',
          lineHeight: 1
        }}>{value}</span>
        <span style={{
          fontSize: 44,
          fontWeight: 700,
          letterSpacing: -1.2,
          lineHeight: 1,
          opacity: 0.85
        }}>{unit}</span>
      </div>
      {footer}
    </div>
  );

  return (
    <div style={{ position: 'relative' }}>
      <IOSDevice width={844} height={390} dark={dark}>
        <div style={{
          height: '100%',
          background: bg,
          padding: '12px 16px',
          display: 'flex',
          flexDirection: 'column',
          gap: 8
        }}>
          <MetricCard
            label="Water Temp"
            value={waterValue.toFixed(1)}
            unit="°C"
            color={waterColor}
          />

          <MetricCard
            label="Engine RPM"
            value={rpmValue.toLocaleString()}
            unit="RPM"
            color={text}
          />

          <MetricCard
            label="Oil Temp"
            value={oilValue.toFixed(1)}
            unit="°C"
            color={oilColor}
          />
        </div>
      </IOSDevice>

      {/* ── Tweaks Panel ── */}
      {tweaksPanelOpen &&
      <div style={{
        position: 'fixed', bottom: 24, right: 24,
        background: '#1e1e2e', color: '#fff',
        borderRadius: 16, padding: 20, width: 280,
        boxShadow: '0 8px 40px rgba(0,0,0,0.5)',
        zIndex: 9999, fontSize: 13
      }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: '#e0e0ff' }}>Tweaks</div>

          <label style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <span style={{ color: '#aaa' }}>Dark Mode</span>
            <input type="checkbox" checked={tweaks.darkMode}
              onChange={(e) => {
                const v = { ...tweaks, darkMode: e.target.checked };
                setTweaks(v);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { darkMode: e.target.checked } }, '*');
              }} />
          </label>

          <label style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <span style={{ color: '#aaa' }}>Live (jitter)</span>
            <input type="checkbox" checked={tweaks.live}
              onChange={(e) => {
                const v = { ...tweaks, live: e.target.checked };
                setTweaks(v);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { live: e.target.checked } }, '*');
              }} />
          </label>

          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ color: '#aaa', marginBottom: 6 }}>Water Temp (°C)</div>
            <input type="range" min={40} max={130} step={1} value={tweaks.waterTemp}
              style={{ width: '100%' }}
              onChange={(e) => {
                const v = { ...tweaks, waterTemp: +e.target.value };
                setTweaks(v);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { waterTemp: +e.target.value } }, '*');
              }} />
            <div style={{ color: '#fff', textAlign: 'right', fontSize: 11 }}>{tweaks.waterTemp} °C</div>
          </label>

          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ color: '#aaa', marginBottom: 6 }}>RPM</div>
            <input type="range" min={0} max={8000} step={100} value={tweaks.rpm}
              style={{ width: '100%' }}
              onChange={(e) => {
                const v = { ...tweaks, rpm: +e.target.value };
                setTweaks(v);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { rpm: +e.target.value } }, '*');
              }} />
            <div style={{ color: '#fff', textAlign: 'right', fontSize: 11 }}>{tweaks.rpm} rpm</div>
          </label>

          <label style={{ display: 'block', marginBottom: 14 }}>
            <div style={{ color: '#aaa', marginBottom: 6 }}>Oil Temp (°C)</div>
            <input type="range" min={40} max={150} step={1} value={tweaks.oilTemp}
              style={{ width: '100%' }}
              onChange={(e) => {
                const v = { ...tweaks, oilTemp: +e.target.value };
                setTweaks(v);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { oilTemp: +e.target.value } }, '*');
              }} />
            <div style={{ color: '#fff', textAlign: 'right', fontSize: 11 }}>{tweaks.oilTemp} °C</div>
          </label>

          <label style={{ display: 'block' }}>
            <div style={{ color: '#aaa', marginBottom: 6 }}>Accent Color</div>
            <input type="color" value={tweaks.accentColor}
              onChange={(e) => {
                const v = { ...tweaks, accentColor: e.target.value };
                setTweaks(v);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: e.target.value } }, '*');
              }} />
          </label>
        </div>
      }
    </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
